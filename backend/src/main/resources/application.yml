# 主配置文件，公共配置放这里
# 通过 SPRING_PROFILES_ACTIVE 环境变量切换 dev/prod

spring:
  application:
    name: campus-competition-backend

  # 激活的配置文件，默认dev
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # 文件上传限制
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

  # JPA公共配置
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        # dialect: org.hibernate.dialect.PostgreSQLDialect

  # RabbitMQ公共配置
  rabbitmq:
    listener:
      simple:
        acknowledge-mode: manual
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2000

# 服务端口
server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# JWT配置
jwt:
  secret: ${JWT_SECRET:campus-competition-jwt-secret-key-2024}
  expiration: ${JWT_EXPIRATION:7200}

# 文件上传路径
upload:
  path: ${UPLOAD_PATH:./uploads}

# AI配置
ai:
  siliconflow:
    api-key: ${SILICONFLOW_API_KEY:}
    base-url: https://api.siliconflow.cn/v1
    embedding-model: BAAI/bge-m3
    chat-model: Qwen/Qwen2.5-7B-Instruct

# Knife4j接口文档
knife4j:
  enable: true
  setting:
    language: zh_cn