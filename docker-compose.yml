services:

  # ================================
  # PostgreSQL + PGVector
  # ================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: competition-postgres
    environment:
      POSTGRES_DB: campus_competition
      POSTGRES_USER: competition
      POSTGRES_PASSWORD: competition123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U competition -d campus_competition"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - competition-network

  # ================================
  # Redis
  # ================================
  redis:
    image: redis:7.2-alpine
    container_name: competition-redis
    ports:
      - "6735:6379"
    command: redis-server --requirepass redis123
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - competition-network

  # ================================
  # RabbitMQ
  # ================================
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: competition-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: competition
      RABBITMQ_DEFAULT_PASS: competition123
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - competition-network

  # ================================
  # SpringBoot 后端
  # ================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: competition-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # 数据库
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: campus_competition
      DB_USERNAME: competition
      DB_PASSWORD: competition123
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis123
      # RabbitMQ
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: competition
      RABBITMQ_PASSWORD: competition123
      # JWT
      JWT_SECRET: campus-competition-jwt-secret-key-2024
      JWT_EXPIRATION: 7200
      # 文件上传
      UPLOAD_PATH: /app/uploads
      # AI配置
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY}
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - competition-network

  # ================================
  # Nginx + 前端
  # ================================
  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: competition-nginx
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - competition-network

# ================================
# 网络
# ================================
networks:
  competition-network:
    driver: bridge

# ================================
# 数据卷
# ================================
volumes:
  postgres_data:
    driver: local